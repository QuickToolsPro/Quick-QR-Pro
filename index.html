<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- CSS यहाँ -->
</head>
<body>
    <form id="inputForm"><!-- inputs --></form>
    <div id="preview"><!-- resume template --></div>
    <button id="speechBtn">🎤 बोलकर भरें</button>
    <button id="download">PDF डाउनलोड</button>
    <script>
        // Speech Recognition
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onresult = (e) => { document.querySelector('input:focus').value = e.results[0][0].transcript; updatePreview(); };
        document.getElementById('speechBtn').onclick = () => recognition.start();

        // Preview Update & Download
        function updatePreview() { /* form data को preview में map करें */ }
        document.getElementById('download').onclick = async () => {
            const canvas = await html2canvas(document.getElementById('preview'));
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF();
            pdf.addImage(imgData, 'PNG', 0, 0);
            pdf.save('resume.pdf');
        };
    </script>
</body>
</html>
