<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickQR Pro - Custom QR & Image Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        canvas { max-width: 100% !important; height: auto !important; border-radius: 12px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen">

    <nav class="border-b border-slate-800 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fa-solid fa-qrcode text-white"></i></div>
                <span class="text-xl font-bold tracking-tight">QuickQR <span class="text-blue-500">Pro</span></span>
            </div>
            <div class="flex gap-4">
                <button onclick="switchTab('tab-qr')" class="text-sm font-medium hover:text-blue-400 transition">QR Generator</button>
                <button onclick="switchTab('tab-compressor')" class="text-sm font-medium hover:text-blue-400 transition">Compressor</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <div id="tab-qr" class="tab-content active space-y-8">
            <div class="text-center">
                <h1 class="text-3xl md:text-5xl font-black mb-4 text-white">
                    Free Custom QR Code Generator
                </h1>
                <p class="text-blue-400 font-bold text-lg">Create & Customize Your Dynamic QR Code, Multiple Formats In Seconds!</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-3">1. यहां Website URL, Any Link, या WiFi डिटेल्स डालें...</label>
                        <textarea id="qr-input" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="https://example.com"></textarea>
                    </div>

                    <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-4">2. Choose Your Style</label>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="updateStyle('square')" class="p-4 rounded-xl border border-slate-700 hover:bg-blue-600 transition flex flex-col items-center gap-2">
                                <i class="fa-solid fa-square text-xl"></i><span class="text-xs">Normal</span>
                            </button>
                            <button onclick="updateStyle('extra-rounded')" class="p-4 rounded-xl border border-blue-500 bg-blue-600/20 transition flex flex-col items-center gap-2">
                                <i class="fa-solid fa-circle-dot text-xl"></i><span class="text-xs">Unique</span>
                            </button>
                            <button onclick="updateStyle('dots')" class="p-4 rounded-xl border border-slate-700 hover:bg-purple-600 transition flex flex-col items-center gap-2">
                                <i class="fa-solid fa-ellipsis text-xl"></i><span class="text-xs">Art</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-center bg-slate-800/30 p-8 rounded-3xl border-2 border-dashed border-slate-700">
                    <div id="canvas-container" class="mb-8 shadow-2xl shadow-blue-500/20"></div>
                    <div id="download-box" class="flex gap-4 w-full">
                        <button onclick="download('png')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/40">Download PNG</button>
                        <button onclick="download('svg')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition">Download SVG</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-compressor" class="tab-content space-y-8">
            <div class="text-center py-10">
                <h2 class="text-4xl font-bold text-white">Image Compressor Pro</h2>
                <p class="text-slate-400 mt-2">Reduce file size without losing quality.</p>
            </div>
            <div class="max-w-xl mx-auto bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center">
                <input type="file" id="img-input" accept="image/*" class="hidden">
                <label for="img-input" class="cursor-pointer flex flex-col items-center gap-4">
                    <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-blue-500"></i>
                    </div>
                    <span class="text-lg font-medium">Click to Upload Image</span>
                </label>
                <div id="comp-preview" class="mt-6 hidden">
                    <p class="text-green-400 text-sm mb-4">Image Loaded Successfully!</p>
                    <button class="w-full bg-green-600 py-3 rounded-xl font-bold">Download Compressed</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-slate-500 text-sm">
        <p>© 2026 QuickQR Pro India. All operations run locally for absolute privacy.</p>
    </footer>

    <script>
        // QR CODE LOGIC
        let currentType = "extra-rounded";
        const qrCode = new QRCodeStyling({
            width: 280,
            height: 280,
            data: "https://quickqrpro.com",
            dotsOptions: { color: "#3b82f6", type: "extra-rounded" },
            backgroundOptions: { color: "#ffffff" },
            cornersSquareOptions: { type: "extra-rounded", color: "#2563eb" }
        });

        qrCode.append(document.getElementById("canvas-container"));

        document.getElementById("qr-input").addEventListener("input", (e) => {
            qrCode.update({ data: e.target.value || "https://quickqrpro.com" });
        });

        function updateStyle(type) {
            qrCode.update({ dotsOptions: { type: type }, cornersSquareOptions: { type: type } });
        }

        function download(ext) {
            qrCode.download({ name: "QuickQR-Pro", extension: ext });
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Simple Compressor Logic
        document.getElementById('img-input').addEventListener('change', function() {
            document.getElementById('comp-preview').classList.remove('hidden');
        });
    </script>
</body>
</html>
